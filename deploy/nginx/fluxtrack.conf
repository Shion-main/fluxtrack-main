upstream fluxtrack_gunicorn {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name fluxtrack.example.edu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fluxtrack.example.edu;

    ssl_certificate /etc/letsencrypt/live/fluxtrack.example.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fluxtrack.example.edu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 12m;

    location /static/ {
        alias /srv/fluxtrack/current/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public media is intentionally limited to normalized faculty portraits.
    # Imports and generated reports remain behind Django authorization checks.
    location /media/profile_photos/ {
        alias /srv/fluxtrack/shared/media/profile_photos/;
        expires 1h;
        add_header X-Content-Type-Options nosniff always;
    }

    location / {
        proxy_pass http://fluxtrack_gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 65s;
    }
}
